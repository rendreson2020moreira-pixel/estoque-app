<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Controle de Estoque</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #74ebd5, #4facfe);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1e73ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .acoes button {
      margin-left: 5px;
      padding: 5px;
      border-radius: 5px;
      width: auto;
    }

    .editar {
      background: green;
      color: white;
    }

    .remover {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📦 Controle de Estoque</h1>

  <input type="text" id="nome" placeholder="Nome do produto">
  <input type="number" id="quantidade" placeholder="Quantidade">

  <button id="btnAdicionar">Adicionar</button>

  <input type="text" id="busca" placeholder="🔍 Buscar..." onkeyup="buscar()">

  <h3>📊 Relatório</h3>
  <p>Total de produtos: <span id="totalProdutos">0</span></p>
  <p>Quantidade total: <span id="totalQuantidade">0</span></p>

  <ul id="lista"></ul>
</div>

<script>
let produtos = []; // 🔥 SEM localStorage (funciona no app)

function adicionar() {
  let nome = document.getElementById("nome").value.trim();
  let quantidade = document.getElementById("quantidade").value;

  if (nome === "" || quantidade === "") {
    alert("Preencha tudo!");
    return;
  }

  if (quantidade <= 0) {
    alert("Quantidade inválida!");
    return;
  }

  produtos.push({
    nome: nome,
    quantidade: Number(quantidade)
  });

  mostrar();
  atualizarRelatorio();

  document.getElementById("nome").value = "";
  document.getElementById("quantidade").value = "";
}

function mostrar(filtro = "") {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  produtos
    .filter(p => p.nome.toLowerCase().includes(filtro.toLowerCase()))
    .forEach((p, i) => {
      lista.innerHTML += `
        <li>
          ${p.nome} - ${p.quantidade}
          <div class="acoes">
            <button class="editar" onclick="editar(${i})">Editar</button>
            <button class="remover" onclick="remover(${i})">X</button>
          </div>
        </li>
      `;
    });
}

function remover(index) {
  produtos.splice(index, 1);
  mostrar();
  atualizarRelatorio();
}

function editar(index) {
  let novoNome = prompt("Novo nome:", produtos[index].nome);
  let novaQuantidade = prompt("Nova quantidade:", produtos[index].quantidade);

  if (!novoNome || !novaQuantidade) return;

  produtos[index].nome = novoNome;
  produtos[index].quantidade = Number(novaQuantidade);

  mostrar();
  atualizarRelatorio();
}

function buscar() {
  let termo = document.getElementById("busca").value;
  mostrar(termo);
}

function atualizarRelatorio() {
  document.getElementById("totalProdutos").innerText = produtos.length;

  let total = produtos.reduce((soma, p) => soma + p.quantidade, 0);
  document.getElementById("totalQuantidade").innerText = total;
}

// 🔥 ESSA LINHA RESOLVE O PROBLEMA DO BOTÃO NO APP
document.getElementById("btnAdicionar").addEventListener("click", adicionar);

</script>

</body>
</html>
