<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle de Estoque</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
}

.app {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="login">
  <h2>🔐 Login</h2>
  <input type="text" id="usuario" placeholder="Usuário">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
  <button onclick="mostrarCadastro()">Criar conta</button>
</div>

<!-- CADASTRO -->
<div class="box" id="cadastro" style="display:none;">
  <h2>📝 Cadastro</h2>
  <input type="text" id="novoUsuario" placeholder="Usuário">
  <input type="password" id="novaSenha" placeholder="Senha">
  <button onclick="cadastrar()">Cadastrar</button>
  <button onclick="voltarLogin()">Voltar</button>
</div>

<!-- APP -->
<div class="box app" id="app">
  <h2>📦 Estoque</h2>

  <p id="userLogado"></p>

  <input type="text" id="nome" placeholder="Produto">
  <input type="number" id="quantidade" placeholder="Quantidade">

  <button onclick="adicionar()">Adicionar</button>
  <button onclick="sair()">Sair</button>

  <ul id="lista"></ul>
</div>

<script>
let usuarioAtual = localStorage.getItem("usuarioAtual");
let produtos = JSON.parse(localStorage.getItem("produtos_" + usuarioAtual)) || [];
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

function mostrarCadastro() {
  login.style.display = "none";
  cadastro.style.display = "block";
}

function voltarLogin() {
  cadastro.style.display = "none";
  login.style.display = "block";
}

function cadastrar() {
  let user = document.getElementById("novoUsuario").value;
  let pass = document.getElementById("novaSenha").value;

  if (!user || !pass) {
    alert("Preencha tudo!");
    return;
  }

  if (usuarios.find(u => u.user === user)) {
    alert("Usuário já existe!");
    return;
  }

  usuarios.push({ user, pass });
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Conta criada!");
  voltarLogin();
}

function entrar() {
  let user = document.getElementById("usuario").value;
  let pass = document.getElementById("senha").value;

  let encontrado = usuarios.find(u => u.user === user && u.pass === pass);

  if (encontrado) {
    localStorage.setItem("usuarioAtual", user);
    location.reload();
  } else {
    alert("Login inválido!");
  }
}

function sair() {
  localStorage.removeItem("usuarioAtual");
  location.reload();
}

function mostrarApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userLogado").innerText = "👤 " + usuarioAtual;

  mostrar();
}

function adicionar() {
  let nome = document.getElementById("nome").value;
  let quantidade = document.getElementById("quantidade").value;

  if (!nome || !quantidade) return;

  produtos.push({ nome, quantidade });

  localStorage.setItem("produtos_" + usuarioAtual, JSON.stringify(produtos));

  mostrar();
}

function mostrar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  produtos.forEach((p, i) => {
    lista.innerHTML += `<li>${p.nome} - ${p.quantidade}</li>`;
  });
}

// 🔥 AUTO LOGIN
if (usuarioAtual) {
  mostrarApp();
}
</script>

</body>
</html>
